<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="riqma_webapp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=3" />

  <title>RIQMA - Renom Integrated Quality Management</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #EDEEF0;
      /* Matches the Logo JPG background */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .splash-container {
      text-align: center;
      animation: fadeIn 1s ease-in;
    }

    .riqma-logo {
      width: 150px;
      /* Adjust size */
      height: auto;
      margin-bottom: 30px;
      animation: pulse 2s infinite ease-in-out;
      border-radius: 12px;
      /* Slight curve to look professional */
    }

    .loader-ring {
      display: block;
      /* Changed from inline-block */
      width: 40px;
      height: 40px;
      margin: 20px auto 0;
      /* Center horizontally and add top margin */
    }

    .loader-ring:after {
      content: " ";
      display: block;
      width: 32px;
      height: 32px;
      margin: 4px;
      border-radius: 50%;
      border: 4px solid #00BFA5;
      /* Teal color from logo */
      border-color: #00BFA5 transparent #00BFA5 transparent;
      animation: ring-spin 1.2s linear infinite;
    }

    @keyframes ring-spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.05);
        opacity: 0.9;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="splash-container">
    <img src="images/riqma_logo.png" class="riqma-logo" alt="RIQMA Loading">
    <div class="loader-ring"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
